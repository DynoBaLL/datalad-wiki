name: doc
concurrency:
  group: ${{ github.workflow }}-${{ github.event.number }}-${{ github.event.ref }}
  cancel-in-progress: true
on:  # yamllint disable-line rule:truthy
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Install Linux dependencies
        run: sudo apt update && sudo apt install -y optipng libenchant-2-2 aspell aspell-en
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.12
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
      - name: Install documentation dependencies
        run: uv pip install --quiet --system .[doc]
      - name: Build HTML documentation
        run: sphinx-build -d ./doc/_build/doctrees -b html doc ./doc/_build -W --keep-going
      - name: Check spelling
        run: sphinx-build -d ./doc/_build/doctrees -b spelling doc ./doc/_build_spelling -W --keep-going
        continue-on-error: true
      - name: Upload documentation artifact
        uses: actions/upload-artifact@v7
        with:
          name: doc-dev
          path: ./doc/_build

  deploy:
    if: ${{ github.event_name == 'push' }}
    needs: build
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: doc-dev
          path: ./doc-dev
      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: ./doc-dev
          target-folder: .
          git-config-name: 'github-actions[bot]'
          git-config-email: 'github-actions[bot]@users.noreply.github.com'
          single-commit: true
          force: true
          clean: true
          clean-exclude: |
            CNAME
            .nojekyll
            .gitignore
            pr-preview/
