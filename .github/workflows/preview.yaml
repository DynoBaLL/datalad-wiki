name: pr-preview
permissions:
  contents: write
  pull-requests: write
concurrency:
  group: ${{ github.workflow }}-${{ github.event.number }}-${{ github.event.ref }}
  cancel-in-progress: true
on:  # yamllint disable-line rule:truthy
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed
  workflow_dispatch:

jobs:
  build:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: 3.12
          architecture: 'x64'
      - name: Install linux dependencies
        run: |
          sudo apt update
          sudo apt install -y optipng libenchant-2-2 aspell aspell-en
      - name: Install package
        run: python -m pip install --progress-bar off .[doc]
      - name: Build doc
        run: sphinx-build -b html doc ./doc/_build --keep-going
        continue-on-error: true
      - name: Deploy preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./doc/_build
